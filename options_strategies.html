<script>
/* ‚îÄ‚îÄ Black-Scholes (used only for calendar spread internals) ‚îÄ‚îÄ */
function normCDF(x){
  const a1=0.254829592,a2=-0.284496736,a3=1.421413741,a4=-1.453152027,a5=1.061405429,p=0.3275911;
  const sign=x<0?-1:1;x=Math.abs(x)/Math.SQRT2;
  const t=1/(1+p*x);
  return 0.5*(1+sign*(1-(((((a5*t+a4)*t)+a3)*t+a2)*t+a1)*t*Math.exp(-x*x)));
}
function bsCall(S,K,T,v,r){
  if(T<=0)return Math.max(0,S-K);
  const d1=(Math.log(S/K)+(r+.5*v*v)*T)/(v*Math.sqrt(T));
  const d2=d1-v*Math.sqrt(T);
  return S*normCDF(d1)-K*Math.exp(-r*T)*normCDF(d2);
}

let activeChart=null;
function makeChart(canvasId,labels,datasets,extraPlugins){
  if(activeChart){try{activeChart.destroy();}catch(e){}}
  activeChart=new Chart(document.getElementById(canvasId),{
    type:'line',
    data:{labels,datasets},
    options:{
      responsive:true,maintainAspectRatio:false,animation:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{
        title:ctx=>'Stock at expiry: $'+labels[ctx[0].dataIndex],
        label:ctx=>{const v=ctx.parsed.y;return (v>=0?' Profit: +$':' Loss: -$')+Math.abs(v).toFixed(2);}
      }}},
      scales:{
        x:{ticks:{maxTicksLimit:9,callback:(v,i)=>'$'+labels[i],font:{size:11},color:'#aaa'},grid:{color:'rgba(0,0,0,0.04)'},border:{color:'transparent'}},
        y:{ticks:{callback:v=>(v>=0?'+$':'-$')+Math.abs(v).toFixed(0),font:{size:11},color:'#aaa'},
           grid:{color:ctx=>ctx.tick.value===0?'rgba(0,0,0,0.18)':'rgba(0,0,0,0.04)'},border:{color:'transparent'}}
      }
    },
    plugins:extraPlugins||[]
  });
}

function prices(lo=50,hi=180,step=2){
  const arr=[];for(let s=lo;s<=hi;s+=step)arr.push(s);return arr;
}
function fmt(v){return (v>=0?'+$':'-$')+Math.abs(v).toFixed(2);}

function mainDS(pays){
  return {data:pays,segment:{borderColor:ctx=>ctx.p1.parsed.y>=0?'#1D9E75':'#E24B4A'},
    backgroundColor:'transparent',borderWidth:2.5,pointRadius:0,tension:0};
}
function legDS(pays,color){
  return {data:pays,borderColor:color,backgroundColor:'transparent',borderWidth:1.5,
    pointRadius:0,tension:0,borderDash:[4,3]};
}

function spotPlugin(S,lo){
  return {id:'spot',afterDraw(ch){
    const{ctx,scales:{x,y}}=ch;
    const idx=Math.round((S-lo)/2);
    if(idx<0||idx>=ch.data.labels.length)return;
    const px=x.getPixelForValue(idx);
    ctx.save();ctx.beginPath();ctx.moveTo(px,y.top);ctx.lineTo(px,y.bottom);
    ctx.strokeStyle='rgba(0,0,0,0.2)';ctx.lineWidth=1;ctx.setLineDash([3,3]);
    ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle='#aaa';ctx.font='10px sans-serif';ctx.textAlign='center';
    ctx.fillText('S=$'+S,px,y.top+11);ctx.restore();
  }};
}

function setMetrics(obj){
  Object.entries(obj).forEach(([k,v])=>{const el=document.getElementById(k);if(el)el.textContent=v;});
}

/* ‚îÄ‚îÄ strategies ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ */
const STRATS=[

{id:'long_call',cat:'Bullish',catCls:'cb-bull',title:'Long call',
 legs:[{side:'Buy',desc:'call at strike K'}],
 desc:'The most basic bullish position. You pay a premium for the right to buy shares at the strike. Maximum loss is the premium paid. Upside is theoretically unlimited.',
 insight:'Use when you expect a significant move up but want limited risk. The further above the strike the stock moves, the more you earn.',
 render(el){
   el.innerHTML=controls(['Stock price (S)',60,160,'s',100],['Strike (K)',60,160,'k',100],['Premium paid',1,30,'p',7])+metricsHTML('pay','You pay upfront')+chartHTML()+legendHTML([{c:'#1D9E75',l:'P&L at expiry'}]);
   bind(el,()=>{
     const S=gv(el,'s'),K=gv(el,'k'),P=gv(el,'p');
     const px=prices();
     const pays=px.map(s=>Math.max(0,s-K)-P);
     const be=K+P;
     setBanner('pay','You pay upfront','Max loss: $'+P+' ¬∑ Breakeven: $'+be.toFixed(0));
     setMetrics({'m-prem':'-$'+P,'m-maxp':'Unlimited','m-maxl':'-$'+P,'m-be':'$'+be.toFixed(0),'m-view':'Bullish'});
     makeChart('ch',px,[mainDS(pays)],[spotPlugin(S,50)]);
   });
 }
},

{id:'long_put',cat:'Bearish',catCls:'cb-bear',title:'Long put',
 legs:[{side:'Buy',desc:'put at strike K'}],
 desc:'Gives you the right to sell at the strike. Profits when the stock falls below the strike by more than the premium paid. Maximum loss is the premium; maximum profit is the strike minus premium.',

   bind(el,()=>{
     const S=gv(el,'s'),K=gv(el,'k'),P=gv(el,'p');
     const px=prices();
     const pays=px.map(s=>Math.max(0,K-s)-P);
     const be=K-P;
     setBanner('pay','You pay upfront','Max loss: $'+P+' ¬∑ Breakeven: $'+be.toFixed(0));
     setMetrics({'m-prem':'-$'+P,'m-maxp':'$'+(K-P),'m-maxl':'-$'+P,'m-be':'$'+be.toFixed(0),'m-view':'Bearish'});
     makeChart('ch',px,[mainDS(pays)],[spotPlugin(S,50)]);
   });
 }
},

{id:'short_call',cat:'Bearish / income',catCls:'cb-bear',title:'Short call (naked)',
 legs:[{side:'Sell',desc:'call at strike K'}],
 desc:'You collect the premium upfront. If the stock stays below the strike, you keep it all. If it rallies above, you must sell at the strike ‚Äî losses are theoretically unlimited.',

     const S=gv(el,'s'),K=gv(el,'k'),P=gv(el,'p');
     const px=prices();
     const pays=px.map(s=>P-Math.max(0,s-K));
     const be=K+P;
     setBanner('receive','You collect upfront','Max profit: $'+P+' ¬∑ Breakeven: $'+be.toFixed(0));
     setMetrics({'m-prem':'+$'+P,'m-maxp':'+$'+P,'m-maxl':'Unlimited','m-be':'$'+be.toFixed(0),'m-view':'Neutral / Bearish'});
     makeChart('ch',px,[mainDS(pays)],[spotPlugin(S,50)]);
   });
 }
},

{id:'short_put',cat:'Bullish / income',catCls:'cb-income',title:'Short put (cash-secured)',
 legs:[{side:'Sell',desc:'put at strike K'}],
 desc:'Collect premium by selling a put. If the stock stays above the strike, you keep the premium. If it falls below, you are obligated to buy shares at the strike.',
 insight:'Effective way to get paid to buy a stock you already want to own at a discount. The strike you choose is the entry price you\'re comfortable with.',
 render(el){
   el.innerHTML=controls(['Stock price (S)',60,160,'s',100],['Strike (K)',60,160,'k',93],['Premium received',1,30,'p',5])+metricsHTML('receive','You collect upfront')+chartHTML()+legendHTML([{c:'#1D9E75',l:'P&L at expiry'}]);
   bind(el,()=>{
     const S=gv(el,'s'),K=gv(el,'k'),P=gv(el,'p');
     const px=prices();
     const pays=px.map(s=>P-Math.max(0,K-s));
     const be=K-P;
     setBanner('receive','You collect upfront','Max profit: $'+P+' ¬∑ Breakeven: $'+be.toFixed(0));
     setMetrics({'m-prem':'+$'+P,'m-maxp':'+$'+P,'m-maxl':'-$'+(K-P),'m-be':'$'+be.toFixed(0),'m-view':'Neutral / Bullish'});
     makeChart('ch',px,[mainDS(pays)],[spotPlugin(S,50)]);
   });
 }
},

{id:'bull_call',cat:'Bullish',catCls:'cb-bull',title:'Bull call spread',
 legs:[{side:'Buy',desc:'call at K‚ÇÅ (lower)'},{side:'Sell',desc:'call at K‚ÇÇ (higher)'}],
 desc:'Buy a call at a lower strike and sell one at a higher strike. The sold call reduces your cost but caps your maximum gain at K‚ÇÇ. You pay a net debit. Profits between the two strikes.',
 insight:'Cheaper than a naked call. Use when you\'re moderately bullish ‚Äî you know roughly where the stock will go, not just "up forever".',
 render(el){
   el.innerHTML=controls(['Stock price (S)',60,160,'s',100],['Lower strike K‚ÇÅ',60,150,'k1',95],['Upper strike K‚ÇÇ',70,160,'k2',110],['K‚ÇÅ call premium paid',1,25,'p1',8],['K‚ÇÇ call premium received',1,20,'p2',3])+metricsHTML('pay','You pay net debit upfront')+chartHTML()+legendHTML([{c:'#1D9E75',l:'Combined P&L'},{c:'rgba(24,95,165,0.5)',l:'Long K‚ÇÅ call'},{c:'rgba(153,60,29,0.5)',l:'Short K‚ÇÇ call'}]);
   bind(el,()=>{
     const S=gv(el,'s'),K1=gv(el,'k1'),K2=gv(el,'k2'),p1=gv(el,'p1'),p2=gv(el,'p2');
     const net=p1-p2;
     const px=prices();
     const l1=px.map(s=>Math.max(0,s-K1)-p1);
     const l2=px.map(s=>p2-Math.max(0,s-K2));
     const comb=px.map(s=>Math.max(0,s-K1)-Math.max(0,s-K2)-net);
     setBanner('pay','You pay net debit upfront','Buy K‚ÇÅ ($'+p1+') ‚Äî sell K‚ÇÇ ($'+p2+') = net $'+net.toFixed(2));
     setMetrics({'m-prem':'-$'+net.toFixed(2),'m-maxp':'$'+(K2-K1-net).toFixed(2),'m-maxl':'-$'+net.toFixed(2),'m-be':'$'+(K1+net).toFixed(2),'m-view':'Bullish (capped)'});
     makeChart('ch',px,[legDS(l1,'rgba(24,95,165,0.45)'),legDS(l2,'rgba(153,60,29,0.45)'),mainDS(comb)],[spotPlugin(S,50)]);
   });
 }
},

{id:'bear_put',cat:'Bearish',catCls:'cb-bear',title:'Bear put spread',
 legs:[{side:'Buy',desc:'put at K‚ÇÇ (higher)'},{side:'Sell',desc:'put at K‚ÇÅ (lower)'}],
 desc:'Buy a higher-strike put and sell a lower-strike put. The sold put offsets some premium cost and caps your maximum profit. Net debit trade. Profits when the stock falls between the two strikes.',

   el.innerHTML=controls(['Stock price (S)',60,160,'s',100],['Put strike K‚ÇÅ (floor)',60,140,'k1',90],['Call strike K‚ÇÇ (cap)',70,160,'k2',112],['Put premium paid',1,15,'pp',4],['Call premium received',1,15,'pc',4])+metricsHTML('net','Net upfront cost')+chartHTML()+legendHTML([{c:'#1D9E75',l:'Collar P&L'},{c:'rgba(136,135,128,0.5)',l:'Stock only'}]);
   bind(el,()=>{
     const S=gv(el,'s'),K1=gv(el,'k1'),K2=gv(el,'k2'),PP=gv(el,'pp'),PC=gv(el,'pc');
     const net=PP-PC;
     const px=prices();
     const strat=px.map(s=>(s-S)-net+Math.max(0,K1-s)-Math.max(0,s-K2));
     const stk=px.map(s=>s-S);

     const bannerLbl=net>0.5?'You pay net upfront':net<-0.5?'You collect net upfront':'Near zero-cost collar';
     setBanner(bannerType,bannerLbl,'Put: $'+PP+' ¬∑ Call: $'+PC+' ¬∑ Net: '+(net>=0?'$':'-$')+Math.abs(net));
     setMetrics({'m-prem':(net>=0?'-$':'+$')+Math.abs(net),'m-maxp':'$'+(K2-S-net).toFixed(2),'m-maxl':'-$'+(S-K1+net).toFixed(2),'m-be':'$'+(S+net),'m-view':'Hedged bullish'});
     makeChart('ch',px,[legDS(stk,'rgba(136,135,128,0.45)'),mainDS(strat)],[spotPlugin(S,50)]);
   });
 }
},

{id:'calendar',cat:'Advanced',catCls:'cb-vol',title:'Calendar spread',
 legs:[{side:'Sell',desc:'near-term option at K'},{side:'Buy',desc:'far-term option at K'}],
 desc:'Sell a short-dated option and buy a longer-dated option at the same strike. You profit from the near-term option decaying faster than the far-term one. Maximum profit occurs if the stock is at the strike when the front month expires.',
 insight:'A pure theta trade. Near-term options decay faster ‚Äî you harvest that differential. The position peaks when the stock sits at the strike on the front expiry date.',
 render(el){
   el.innerHTML=controls(['Stock price (S)',60,160,'s',100],['Strike (K)',60,160,'k',100],['Near expiry (months)',1,12,'t1',1],['Far expiry (months)',2,24,'t2',4],['Near call premium (sold)',1,15,'pnear',5],['Far call premium (bought)',2,25,'pfar',12])+metricsHTML('pay','You pay net debit upfront')+chartHTML()+legendHTML([{c:'#1D9E75',l:'P&L at front expiry'},{c:'rgba(136,135,128,0.4)',l:'Stock only'}]);
   bind(el,()=>{
     const S=gv(el,'s'),K=gv(el,'k'),T1=gv(el,'t1')/12,T2=gv(el,'t2')/12;
     const pnear=gv(el,'pnear'),pfar=gv(el,'pfar');
     const net=pfar-pnear;
     const px=prices();
     // At front expiry: near expires at intrinsic; estimate far value using BS with fixed vol=0.25
     const pnl=px.map(s=>{
       const nearExp=Math.max(0,s-K);
       const farRemain=bsCall(s,K,T2-T1,0.25,0.04);
       return farRemain-nearExp-net;
     });
     const stk=px.map(s=>s-S);
     setBanner('pay','You pay net debit upfront','Buy far call ($'+pfar+') ‚Äî sell near call ($'+pnear+') = $'+net.toFixed(2));
     setMetrics({'m-prem':'-$'+net.toFixed(2),'m-maxp':'Max near K=$'+K,'m-maxl':'-$'+net.toFixed(2),'m-be':'Near K at front expiry','m-view':'Neutral (theta play)'});
     makeChart('ch',px,[legDS(stk,'rgba(136,135,128,0.4)'),mainDS(pnl)],[spotPlugin(S,50)]);
   });
 }
},

/* ‚îÄ‚îÄ CATEGORIES ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ */
const CATS=[
  {label:'Bullish',ids:['long_call','bull_call','bull_put']},
  {label:'Bearish',ids:['long_put','short_call','bear_put','bear_call']},
  {label:'Neutral / income',ids:['short_put','long_straddle','short_straddle','long_strangle','short_strangle','iron_condor','iron_butterfly','butterfly','condor']},

];

/* ‚îÄ‚îÄ UI helpers ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ */
function controls(...rows){
  return '<div class="controls">'+rows.map(([lbl,min,max,id,val])=>{
    const display=id==='t1'||id==='t2'?val+' mo':'$'+val;
    return `<div class="sl-row"><label>${lbl}</label><input type="range" min="${min}" max="${max}" value="${val}" step="1" data-id="${id}"><span class="sl-val" data-out="${id}">${display}</span></div>`;
  }).join('')+'</div>';
}
function metricsHTML(bannerType='receive', bannerLbl='You collect today'){
  return `<div id="m-banner" class="cash-banner ${bannerType}">
    <div>
      <div class="cash-label" id="m-banner-lbl">${bannerLbl}</div>
      <div class="cash-sub" id="m-banner-sub">Upfront, before expiry</div>
    </div>
    <div class="cash-amount" id="m-prem">‚Äî</div>
  </div>
  <div class="metrics">
    <div class="mc"><div class="ml">Max profit</div><div class="mv" id="m-maxp" style="color:#0F6E56">‚Äî</div></div>
    <div class="mc"><div class="ml">Max loss</div><div class="mv" id="m-maxl" style="color:#A32D2D">‚Äî</div></div>
    <div class="mc"><div class="ml">Breakeven</div><div class="mv" id="m-be">‚Äî</div></div>
    <div class="mc"><div class="ml">View</div><div class="mv" id="m-view" style="font-size:13px;">‚Äî</div></div>
  </div>`;
}
function setBanner(type, lbl, sub){
  const b=document.getElementById('m-banner');
  if(b){b.className='cash-banner '+type;}
  const bl=document.getElementById('m-banner-lbl');if(bl)bl.textContent=lbl;
  const bs=document.getElementById('m-banner-sub');if(bs)bs.textContent=sub;
}
function chartHTML(){return `<div class="chart-wrap"><canvas id="ch"></canvas></div>`;}
function legendHTML(items){
  return '<div class="legend">'+items.map(({c,l})=>`<span><i style="background:${c}"></i>${l}</span>`).join('')+'</div>';
}
function gv(el,id){return +el.querySelector(`[data-id="${id}"]`).value;}
function bind(el,fn){
  el.querySelectorAll('input[type=range]').forEach(inp=>{
    inp.addEventListener('input',()=>{
      const out=el.querySelector(`[data-out="${inp.dataset.id}"]`);
      if(out){
        const v=inp.value,id=inp.dataset.id;
        out.textContent=id==='t1'||id==='t2'?v+' mo':'$'+v;
      }
      fn();
    });
  });
  fn();
}

/* ‚îÄ‚îÄ render nav + first page ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ */
function buildNav(){
  const nav=document.getElementById('nav');
  nav.innerHTML=CATS.map(cat=>`
    <div class="cat-lbl">${cat.label}</div>
    ${cat.ids.map(id=>{const s=STRATS.find(x=>x.id===id);return `<button class="s-btn" id="btn-${id}" onclick="show('${id}');closeSidebar()"><span class="s-dot"></span>${s.title}</button>`;}).join('')}
  `).join('');
}

function show(id){
  const s=STRATS.find(x=>x.id===id);if(!s)return;
  document.querySelectorAll('.s-btn').forEach(b=>b.classList.remove('active'));
  const btn=document.getElementById('btn-'+id);if(btn)btn.classList.add('active');

  const legs=s.legs.map(l=>`<div class="leg-chip ${l.side==='Buy'||l.side==='Own'?'lc-buy':'lc-sell'}"><span class="leg-side">${l.side}</span>${l.desc}</div>`).join('');

  const wrap=document.getElementById('content');
  wrap.innerHTML=`
    <div class="section-card">
      <span class="cat-badge ${s.catCls}">${s.cat}</span>
      <h1 class="page-title">${s.title}</h1>
      <div class="legs-row">${legs}</div>
      <p class="dimmer">${s.desc}</p>
      <div id="widget"></div>
      <div class="callout">${s.insight}</div>
    </div>`;
  s.render(document.getElementById('widget'));
  document.getElementById('main').scrollTop=0;
  window.scrollTo(0,0);
}

function toggleSidebar(){
  const sb=document.getElementById('sidebar');
  const ov=document.getElementById('overlay');
  const open=sb.classList.toggle('open');
  ov.classList.toggle('show',open);
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

buildNav();
show('long_call');
</script>

<script>
/* ── helpers ─────────────────────────────────────── */
function normCDF(x){
  const a1=0.254829592,a2=-0.284496736,a3=1.421413741,a4=-1.453152027,a5=1.061405429,p=0.3275911;
  const sign=x<0?-1:1;x=Math.abs(x)/Math.SQRT2;
  const t=1/(1+p*x);
  return 0.5*(1+sign*(1-(((((a5*t+a4)*t)+a3)*t+a2)*t+a1)*t*Math.exp(-x*x)));
}
function bsCall(S,K,T,v,r){
  if(T<=0)return Math.max(0,S-K);
  const d1=(Math.log(S/K)+(r+.5*v*v)*T)/(v*Math.sqrt(T));
  const d2=d1-v*Math.sqrt(T);
  return S*normCDF(d1)-K*Math.exp(-r*T)*normCDF(d2);
}
function bsPut(S,K,T,v,r){
  return bsCall(S,K,T,v,r)-S+K*Math.exp(-r*T);
}

let activeChart=null;
function makeChart(canvasId,labels,datasets,extraPlugins){
  if(activeChart){try{activeChart.destroy();}catch(e){}}
  activeChart=new Chart(document.getElementById(canvasId),{
    type:'line',
    data:{labels,datasets},
    options:{
      responsive:true,maintainAspectRatio:false,animation:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{
        title:ctx=>'Stock at expiry: $'+labels[ctx[0].dataIndex],
        label:ctx=>{const v=ctx.parsed.y;return (v>=0?' Profit: +$':' Loss: -$')+Math.abs(v).toFixed(2);}
      }}},
      scales:{
        x:{ticks:{maxTicksLimit:9,callback:(v,i)=>'$'+labels[i],font:{size:11},color:'#aaa'},grid:{color:'rgba(0,0,0,0.04)'},border:{color:'transparent'}},
        y:{ticks:{callback:v=>(v>=0?'+$':'-$')+Math.abs(v).toFixed(0),font:{size:11},color:'#aaa'},
           grid:{color:ctx=>ctx.tick.value===0?'rgba(0,0,0,0.18)':'rgba(0,0,0,0.04)'},border:{color:'transparent'}}
      }
    },
    plugins:extraPlugins||[]
  });
}

function prices(lo=50,hi=180,step=2){
  const arr=[];for(let s=lo;s<=hi;s+=step)arr.push(s);return arr;
}
function fmt(v){return (v>=0?'+$':'-$')+Math.abs(v).toFixed(2);}
function fmtStat(v,inf){if(inf)return inf==='+'?'Unlimited':'–∞';return fmt(v);}

function mainDS(pays){
  return {data:pays,segment:{borderColor:ctx=>ctx.p1.parsed.y>=0?'#1D9E75':'#E24B4A'},
    backgroundColor:'transparent',borderWidth:2.5,pointRadius:0,tension:0};
}
function legDS(pays,color){
  return {data:pays,borderColor:color,backgroundColor:'transparent',borderWidth:1.5,
    pointRadius:0,tension:0,borderDash:[4,3]};
}

function spotPlugin(S,lo){
  return {id:'spot',afterDraw(ch){
    const{ctx,scales:{x,y}}=ch;
    const idx=Math.round((S-lo)/2);
    if(idx<0||idx>=ch.data.labels.length)return;
    const px=x.getPixelForValue(idx);
    ctx.save();ctx.beginPath();ctx.moveTo(px,y.top);ctx.lineTo(px,y.bottom);
    ctx.strokeStyle='rgba(0,0,0,0.2)';ctx.lineWidth=1;ctx.setLineDash([3,3]);
    ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle='#aaa';ctx.font='10px sans-serif';ctx.textAlign='center';
    ctx.fillText('S=$'+S,px,y.top+11);ctx.restore();
  }};
}

function setMetrics(obj){
  Object.entries(obj).forEach(([k,v])=>{const el=document.getElementById(k);if(el)el.textContent=v;});
}

/* ── strategies ──────────────────────────────────── */
const STRATS=[

{id:'long_call',cat:'Bullish',catCls:'cb-bull',title:'Long call',
 legs:[{side:'Buy',desc:'call at strike K'}],
 params:['S','K','T','V'],
 desc:'The most basic bullish position. You pay a premium for the right to buy 100 shares at the strike. Maximum loss is the premium paid, no matter how far the stock falls. Upside is theoretically unlimited.',
 insight:'Use when you expect a significant move up but want limited risk. Beware theta decay — the option loses time value every day.',
 render(el){
   const def={S:100,K:100,T:3,V:25};
   el.innerHTML=controls(['Stock price (S)',60,160,'s',def.S],['Strike (K)',60,160,'k',def.K],['Months to expiry',1,24,'t',def.T],['Impl. vol %',5,80,'v',def.V])+metricsHTML()+chartHTML()+legendHTML([{c:'#1D9E75',l:'P&L at expiry'}]);
   bind(el,()=>{
     const S=gv(el,'s'),K=gv(el,'k'),T=gv(el,'t')/12,V=gv(el,'v')/100;
     const prem=bsCall(S,K,T,V,0.04);
     const px=prices();
     const pays=px.map(s=>Math.max(0,s-K)-prem);
     const be=K+prem;
     setMetrics({'m-prem':'$'+prem.toFixed(2),'m-maxp':'Unlimited','m-maxl':'-$'+prem.toFixed(2),'m-be':'$'+be.toFixed(2)});
     makeChart('ch',px,[mainDS(pays)],[spotPlugin(S,50)]);
   });
 }
},

{id:'long_put',cat:'Bearish',catCls:'cb-bear',title:'Long put',
 legs:[{side:'Buy',desc:'put at strike K'}],
 desc:'Gives you the right to sell at the strike. Profits when the stock falls below the strike by more than the premium paid. Maximum loss is the premium; maximum profit is the strike minus premium (stock can only go to zero).',
 insight:'Classic downside speculation or portfolio insurance. More time = more expensive, but slower decay early in the option\'s life.',
 render(el){
   const def={S:100,K:100,T:3,V:25};
   el.innerHTML=controls(['Stock price (S)',60,160,'s',def.S],['Strike (K)',60,160,'k',def.K],['Months to expiry',1,24,'t',def.T],['Impl. vol %',5,80,'v',def.V])+metricsHTML()+chartHTML()+legendHTML([{c:'#1D9E75',l:'P&L at expiry'}]);
   bind(el,()=>{
     const S=gv(el,'s'),K=gv(el,'k'),T=gv(el,'t')/12,V=gv(el,'v')/100;
     const prem=bsPut(S,K,T,V,0.04);
     const px=prices();
     const pays=px.map(s=>Math.max(0,K-s)-prem);
     setMetrics({'m-prem':'$'+prem.toFixed(2),'m-maxp':'$'+(K-prem).toFixed(2),'m-maxl':'-$'+prem.toFixed(2),'m-be':'$'+(K-prem).toFixed(2)});
     makeChart('ch',px,[mainDS(pays)],[spotPlugin(S,50)]);
   });
 }
},

{id:'short_call',cat:'Bearish / income',catCls:'cb-bear',title:'Short call (naked)',
 legs:[{side:'Sell',desc:'call at strike K'}],
 desc:'You collect the premium upfront. If the stock stays below the strike, you keep it all. If it rallies above, you have an obligation to sell shares at the strike — and losses are theoretically unlimited. High-risk position.',
 insight:'Naked short calls require significant margin. Usually done only by experienced traders or replaced with a spread to define risk.',

   bind(el,()=>{
     const S=gv(el,'s'),K=gv(el,'k'),T=gv(el,'t')/12,V=gv(el,'v')/100;
     const prem=bsCall(S,K,T,V,0.04);
     const px=prices();
     const pays=px.map(s=>prem-Math.max(0,s-K));

     makeChart('ch',px,[mainDS(pays)],[spotPlugin(S,50)]);
   });
 }
},

{id:'short_put',cat:'Bullish / income',catCls:'cb-income',title:'Short put (cash-secured)',
 legs:[{side:'Sell',desc:'put at strike K'}],
 desc:'Collect premium by selling a put. If the stock stays above the strike, you keep the premium. If it falls below, you are obligated to buy shares at the strike. "Cash-secured" means you hold cash to cover that purchase.',
 insight:'Effective way to get paid to buy a stock you already want to own at a discount. The strike you choose is the entry price you\'re comfortable with.',
 render(el){
   el.innerHTML=controls(['Stock price (S)',60,160,'s',100],['Strike (K)',60,160,'k',95],['Months to expiry',1,24,'t',1],['Impl. vol %',5,80,'v',25])+metricsHTML()+chartHTML()+legendHTML([{c:'#1D9E75',l:'P&L at expiry'}]);
   bind(el,()=>{
     const S=gv(el,'s'),K=gv(el,'k'),T=gv(el,'t')/12,V=gv(el,'v')/100;
     const prem=bsPut(S,K,T,V,0.04);
     const px=prices();
     const pays=px.map(s=>prem-Math.max(0,K-s));
     setMetrics({'m-prem':'+$'+prem.toFixed(2),'m-maxp':'+$'+prem.toFixed(2),'m-maxl':'-$'+(K-prem).toFixed(2),'m-be':'$'+(K-prem).toFixed(2)});
     makeChart('ch',px,[mainDS(pays)],[spotPlugin(S,50)]);
   });
 }
},

{id:'bull_call',cat:'Bullish',catCls:'cb-bull',title:'Bull call spread',
 legs:[{side:'Buy',desc:'call at K₁ (lower)'},{side:'Sell',desc:'call at K₂ (higher)'}],
 desc:'Buy a call at a lower strike and sell one at a higher strike. The sold call reduces the premium cost but caps your maximum gain at K₂. You pay a net debit. Profits between the two strikes.',
 insight:'Cheaper than a naked call. Use when you\'re moderately bullish — you know roughly where the stock will go, not just "up forever".',
 render(el){
   el.innerHTML=controls(['Stock price (S)',60,160,'s',100],['Lower strike K₁',60,150,'k1',95],['Upper strike K₂',70,160,'k2',110],['Months to expiry',1,24,'t',2],['Impl. vol %',5,80,'v',25])+metricsHTML()+chartHTML()+legendHTML([{c:'#1D9E75',l:'Combined P&L'},{c:'rgba(24,95,165,0.5)',l:'Long K₁ call'},{c:'rgba(153,60,29,0.5)',l:'Short K₂ call'}]);
   bind(el,()=>{
     const S=gv(el,'s'),K1=gv(el,'k1'),K2=gv(el,'k2'),T=gv(el,'t')/12,V=gv(el,'v')/100;
     const p1=bsCall(S,K1,T,V,0.04),p2=bsCall(S,K2,T,V,0.04);
     const net=p1-p2;
     const px=prices();
     const l1=px.map(s=>Math.max(0,s-K1)-p1);
     const l2=px.map(s=>p2-Math.max(0,s-K2));
     const comb=px.map(s=>Math.max(0,s-K1)-Math.max(0,s-K2)-net);
     setMetrics({'m-prem':'-$'+net.toFixed(2),'m-maxp':'$'+(K2-K1-net).toFixed(2),'m-maxl':'-$'+net.toFixed(2),'m-be':'$'+(K1+net).toFixed(2)});
     makeChart('ch',px,[legDS(l1,'rgba(24,95,165,0.45)'),legDS(l2,'rgba(153,60,29,0.45)'),mainDS(comb)],[spotPlugin(S,50)]);
   });
 }
},

 legs:[{side:'Buy',desc:'put at K₂ (higher)'},{side:'Sell',desc:'put at K₁ (lower)'}],
 desc:'Buy a higher-strike put and sell a lower-strike put. The sold put offsets some premium cost and caps your maximum profit at K₁. Net debit trade. Profits when the stock falls between the two strikes.',
 insight:'Cheaper than a naked long put. Best when you expect a moderate decline to a specific level, not a crash to zero.',
 render(el){
   el.innerHTML=controls(['Stock price (S)',60,160,'s',100],['Lower strike K₁',60,140,'k1',85],['Upper strike K₂',70,150,'k2',100],['Months to expiry',1,24,'t',2],['Impl. vol %',5,80,'v',25])+metricsHTML()+chartHTML()+legendHTML([{c:'#1D9E75',l:'Combined P&L'},{c:'rgba(24,95,165,0.5)',l:'Long K₂ put'},{c:'rgba(153,60,29,0.5)',l:'Short K₁ put'}]);
   bind(el,()=>{
     const S=gv(el,'s'),K1=gv(el,'k1'),K2=gv(el,'k2'),T=gv(el,'t')/12,V=gv(el,'v')/100;
     const p1=bsPut(S,K1,T,V,0.04),p2=bsPut(S,K2,T,V,0.04);
     const net=p2-p1;
     const px=prices();
     const l1=px.map(s=>Math.max(0,K2-s)-p2);
     const l2=px.map(s=>p1-Math.max(0,K1-s));
     const comb=px.map(s=>Math.max(0,K2-s)-Math.max(0,K1-s)-net);
     setMetrics({'m-prem':'-$'+net.toFixed(2),'m-maxp':'$'+(K2-K1-net).toFixed(2),'m-maxl':'-$'+net.toFixed(2),'m-be':'$'+(K2-net).toFixed(2)});
     makeChart('ch',px,[legDS(l1,'rgba(24,95,165,0.45)'),legDS(l2,'rgba(153,60,29,0.45)'),mainDS(comb)],[spotPlugin(S,50)]);
   });
 }
},

{id:'bull_put',cat:'Bullish / income',catCls:'cb-income',title:'Bull put spread (credit)',
 legs:[{side:'Sell',desc:'put at K₂ (higher)'},{side:'Buy',desc:'put at K₁ (lower)'}],
 desc:'Sell a higher-strike put and buy a lower-strike put for protection. You collect a net credit. Maximum profit is the credit collected (stock stays above K₂). Maximum loss is the spread width minus the credit.',
 insight:'Income-oriented bullish trade. You collect premium and keep it as long as the stock doesn\'t fall below your upper strike. Defined risk, unlike a naked short put.',

   el.innerHTML=controls(['Stock price (S)',60,160,'s',100],['Lower strike K₁ (protection)',60,140,'k1',88],['Upper strike K₂ (sold)',70,150,'k2',98],['Months to expiry',1,24,'t',1],['Impl. vol %',5,80,'v',25])+metricsHTML()+chartHTML()+legendHTML([{c:'#1D9E75',l:'Combined P&L'}]);
   bind(el,()=>{
     const S=gv(el,'s'),K1=gv(el,'k1'),K2=gv(el,'k2'),T=gv(el,'t')/12,V=gv(el,'v')/100;
     const p1=bsPut(S,K1,T,V,0.04),p2=bsPut(S,K2,T,V,0.04);

     makeChart('ch',px,[mainDS(comb)],[spotPlugin(S,50)]);
   });
 }
},

{id:'bear_call',cat:'Bearish / income',catCls:'cb-income',title:'Bear call spread (credit)',
 legs:[{side:'Sell',desc:'call at K₁ (lower)'},{side:'Buy',desc:'call at K₂ (higher)'}],
 desc:'Sell a lower-strike call and buy a higher-strike call for protection. You collect a net credit. Maximum profit is the credit (stock stays below K₁). Maximum loss is the spread width minus the credit.',

   bind(el,()=>{

     makeChart('ch',px,[mainDS(comb)],[spotPlugin(S,50)]);

},

{id:'long_straddle',cat:'Volatility',catCls:'cb-vol',title:'Long straddle',
 legs:[{side:'Buy',desc:'call at K'},{side:'Buy',desc:'put at K'}],
 desc:'Buy a call and a put at the same strike and expiry. You pay two premiums and profit from a large move in either direction. Maximum loss is the total premium paid, which occurs if the stock is exactly at the strike at expiry.',
 insight:'The purest long-volatility bet. You don\'t care about direction — you just need the stock to move enough to cover both premiums. Often used ahead of binary events like earnings.',
 render(el){
   el.innerHTML=controls(['Stock price (S)',60,160,'s',100],['Strike (K)',60,160,'k',100],['Months to expiry',1,24,'t',2],['Impl. vol %',5,80,'v',25])+metricsHTML()+chartHTML()+legendHTML([{c:'#1D9E75',l:'Combined P&L'},{c:'rgba(24,95,165,0.4)',l:'Long call'},{c:'rgba(153,60,29,0.4)',l:'Long put'}]);
   bind(el,()=>{
     const S=gv(el,'s'),K=gv(el,'k'),T=gv(el,'t')/12,V=gv(el,'v')/100;
     const cp=bsCall(S,K,T,V,0.04),pp=bsPut(S,K,T,V,0.04);
     const total=cp+pp;
     const px=prices();
     const lc=px.map(s=>Math.max(0,s-K)-cp);
     const lp=px.map(s=>Math.max(0,K-s)-pp);
     const comb=px.map(s=>Math.max(0,s-K)+Math.max(0,K-s)-total);
     setMetrics({'m-prem':'-$'+total.toFixed(2),'m-maxp':'Unlimited','m-maxl':'-$'+total.toFixed(2),'m-be':'$'+(K-total).toFixed(2)+' / $'+(K+total).toFixed(2)});
     makeChart('ch',px,[legDS(lc,'rgba(24,95,165,0.4)'),legDS(lp,'rgba(153,60,29,0.4)'),mainDS(comb)],[spotPlugin(S,50)]);
   });
 }

{id:'calendar',cat:'Advanced',catCls:'cb-vol',title:'Calendar spread',
 legs:[{side:'Sell',desc:'near-term option at K'},{side:'Buy',desc:'far-term option at K'}],
 desc:'Sell a short-dated option and buy a longer-dated option at the same strike. You profit from the near-term option decaying faster than the far-term one. Maximum profit occurs if the stock is at the strike when the front month expires.',
 insight:'A pure theta trade. Near-term options decay faster — you harvest that difference. IV sensitivity (vega) also differs: short the fast-decaying front, long the slower-decaying back.',
 render(el){
   el.innerHTML=controls(['Stock price (S)',60,160,'s',100],['Strike (K)',60,160,'k',100],['Near expiry (months)',1,12,'t1',1],['Far expiry (months)',2,24,'t2',4],['Impl. vol %',5,80,'v',25])+metricsHTML()+chartHTML()+legendHTML([{c:'#1D9E75',l:'P&L at front expiry'},{c:'rgba(136,135,128,0.5)',l:'Stock only'}]);
   bind(el,()=>{
     const S=gv(el,'s'),K=gv(el,'k'),T1=gv(el,'t1')/12,T2=gv(el,'t2')/12,V=gv(el,'v')/100;
     const near=bsCall(S,K,T1,V,0.04),far=bsCall(S,K,T2,V,0.04);
     const net=far-near;
     const px=prices();
     const pnl=px.map(s=>{
       const nearExp=Math.max(0,s-K);
       const farRemain=bsCall(s,K,T2-T1,V,0.04);
       return farRemain-nearExp-net;
     });
     setMetrics({'m-prem':'-$'+net.toFixed(2),'m-maxp':'Max near K=$'+K,'m-maxl':'-$'+net.toFixed(2),'m-be':'Near K at front expiry'});
     makeChart('ch',px,[mainDS(pnl)],[spotPlugin(S,50)]);
   });
 }
},

];

/* ── CATEGORIES ───────────────────────────────── */
const CATS=[
  {label:'Bullish',ids:['long_call','bull_call','bull_put']},
  {label:'Bearish',ids:['long_put','short_call','bear_put','bear_call']},
  {label:'Neutral / income',ids:['short_put','long_straddle','short_straddle','long_strangle','short_strangle','iron_condor','iron_butterfly','butterfly','condor']},
  {label:'Stock strategies',ids:['covered_call','protective_put','collar']},
  {label:'Synthetic',ids:['synth_long']},
  {label:'Advanced',ids:['ratio_spread','backspread','calendar']},
];

/* ── UI helpers ───────────────────────────────── */
function controls(...rows){
  return '<div class="controls">'+rows.map(([lbl,min,max,id,val])=>`
    <div class="sl-row">
      <label>${lbl}</label>
      <input type="range" min="${min}" max="${max}" value="${val}" step="1" data-id="${id}">
      <span class="sl-val" data-out="${id}">${lbl.includes('vol')||lbl.includes('Impl')?val+'%':'$'+val}</span>
    </div>`).join('')+'</div>';
}
function metricsHTML(){
  return `<div class="metrics">
    <div class="mc"><div class="ml">Premium</div><div class="mv" id="m-prem">—</div></div>
    <div class="mc"><div class="ml">Max profit</div><div class="mv" id="m-maxp" style="color:#0F6E56">—</div></div>
    <div class="mc"><div class="ml">Max loss</div><div class="mv" id="m-maxl" style="color:#A32D2D">—</div></div>
    <div class="mc"><div class="ml">Breakeven</div><div class="mv" id="m-be">—</div></div>
  </div>`;
}
function chartHTML(){return `<div class="chart-wrap"><canvas id="ch"></canvas></div>`;}
function legendHTML(items){
  return '<div class="legend">'+items.map(({c,l})=>`<span><i style="background:${c}"></i>${l}</span>`).join('')+'</div>';
}
function gv(el,id){return +el.querySelector(`[data-id="${id}"]`).value;}
function bind(el,fn){
  el.querySelectorAll('input[type=range]').forEach(inp=>{
    inp.addEventListener('input',()=>{
      const out=el.querySelector(`[data-out="${inp.dataset.id}"]`);
      if(out){const v=inp.value;out.textContent=inp.dataset.id==='v'||inp.dataset.id.startsWith('v')?v+'%':'$'+v;}
      fn();
    });
  });
  fn();
}

/* ── render nav + first page ──────────────────── */
function buildNav(){
  const nav=document.getElementById('nav');
  nav.innerHTML=CATS.map(cat=>`
    <div class="cat-lbl">${cat.label}</div>
    ${cat.ids.map(id=>{const s=STRATS.find(x=>x.id===id);return `<button class="s-btn" id="btn-${id}" onclick="show('${id}')"><span class="s-dot"></span>${s.title}</button>`;}).join('')}
  `).join('');
}

function show(id){
  const s=STRATS.find(x=>x.id===id);if(!s)return;
  document.querySelectorAll('.s-btn').forEach(b=>b.classList.remove('active'));
  const btn=document.getElementById('btn-'+id);if(btn)btn.classList.add('active');

  const legs=s.legs.map(l=>`<div class="leg-chip ${l.side==='Buy'||l.side==='Own'?'lc-buy':'lc-sell'}"><span class="leg-side">${l.side}</span>${l.desc}</div>`).join('');

  const wrap=document.getElementById('content');
  wrap.innerHTML=`
    <div class="section-card">
      <span class="cat-badge ${s.catCls}">${s.cat}</span>
      <h1 class="page-title">${s.title}</h1>
      <div class="legs-row">${legs}</div>
      <p class="dimmer">${s.desc}</p>
      <div id="widget"></div>
      <div class="callout">${s.insight}</div>
    </div>`;
  s.render(document.getElementById('widget'));
  window.scrollTo(0,0);
}

buildNav();
show('long_call');
</script>
